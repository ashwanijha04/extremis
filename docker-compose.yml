services:
  server:
    build: .
    ports:
      - "8000:8000"
    environment:
      EXTREMIS_STORE: postgres
      EXTREMIS_POSTGRES_URL: postgresql://extremis:extremis@db:5432/extremis
      EXTREMIS_EMBEDDER: all-MiniLM-L6-v2
    volumes:
      - lore_data:/data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: extremis
      POSTGRES_PASSWORD: extremis
      POSTGRES_DB: extremis
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U extremis"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lore_data:
  pg_data:
