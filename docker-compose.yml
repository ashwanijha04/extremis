services:
  server:
    build: .
    ports:
      - "8000:8000"
    environment:
      LORE_STORE: postgres
      LORE_POSTGRES_URL: postgresql://lore:lore@db:5432/lore
      LORE_EMBEDDER: all-MiniLM-L6-v2
    volumes:
      - lore_data:/data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lore
      POSTGRES_PASSWORD: lore
      POSTGRES_DB: lore
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lore"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lore_data:
  pg_data:
