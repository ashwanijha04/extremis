site_name: extremis
site_url: https://ashwanijha04.github.io/extremis/docs/
site_description: Layered, learning memory for AI agents — log-first, RL-scored, MCP-ready
site_author: Ashwani Jha
repo_url: https://github.com/ashwanijha04/extremis
repo_name: ashwanijha04/extremis
edit_uri: edit/main/docs-src/

docs_dir: docs-src
site_dir: docs/docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.instant
    - toc.follow

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ashwanijha04/extremis
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/extremis

copyright: MIT License · Built by Ashwani Jha

nav:
