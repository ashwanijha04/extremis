  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - Your first memory: getting-started/first-memory.md
  - Wrap (simplest):
    - Overview: wrap/index.md
    - Anthropic / Claude: wrap/anthropic.md
    - OpenAI: wrap/openai.md
  - Core Concepts:
    - Memory layers: concepts/memory-layers.md
    - RL scoring: concepts/rl-scoring.md
    - Knowledge graph: concepts/knowledge-graph.md
    - Consolidation: concepts/consolidation.md
    - Attention scoring: concepts/attention-scoring.md
    - Namespaces: concepts/namespaces.md
  - Backends:
    - Overview: backends/index.md
    - SQLite (default): backends/sqlite.md
    - Supabase: backends/supabase.md
    - Postgres + pgvector: backends/postgres.md
    - Chroma: backends/chroma.md
    - Pinecone: backends/pinecone.md
    - Migrating: backends/migration.md
  - Integrations:
