[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "friday-memory"
version = "0.1.0"
description = "Layered memory platform for AI agents — log-first, RL-scored, consolidation-backed"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "sentence-transformers>=3.0",
    "numpy>=1.26",
    "anthropic>=0.40",
    # Postgres (optional, for consolidated store)
    "asyncpg>=0.29",
    # SQLite vector search
    "sqlite-vec>=0.1",
]

[project.optional-dependencies]
mcp = ["mcp>=1.0"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "mypy>=1.10",
]

[tool.hatch.build.targets.wheel]
packages = ["src/friday_memory"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
strict = true
python_version = "3.11"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
